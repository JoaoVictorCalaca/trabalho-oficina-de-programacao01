<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Chronic.ia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../public/icon.png" type="image/x-icon">
</head>

<body>
    <main class="login-container">
        <div class="login-box">
            <form action="#">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <div class="label-wrapper">
                        <label for="password">Senha</label>
                        <a href="#" class="forgot-link">Esqueceu?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <a href="./chat.html" class="btn-login">Entrar na conta</a>
            </form>

            <div class="divider">
                <span>ou continue com</span>
            </div>

            <div class="social-login">
                <button class="btn-social">Google</button>
                <button class="btn-social">Apple</button>
            </div>

            <p class="signup-text">
                Não tem uma conta? <a href="#">Criar agora</a>
            </p>
        </div>

        <a href="./index.html" class="back-home">← Voltar para a Home</a>
    </main>
</body>

</html>
