<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Chronic.ia</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="../public/icon.png" type="image/x-icon">
</head>

<body>
  <main class="login-container">
    <div class="login-box">
      <form action="#">
        <div class="input-group">
          <label for="name">Nome Completo</label>
          <input type="text" id="name">
        </div>

        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email">
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password">
        </div>

        <a href="./chat.html" class="btn-login">Criar minha conta</a>
      </form>

      <div class="divider">
        <span>Cadastre-se com</span>
      </div>

      <div class="social-login">
        <button class="btn-social">Google</button>
        <button class="btn-social">Apple</button>
      </div>

      <p class="signup-text">
        Já tem uma conta? <a href="./login.html">Fazer login</a>
      </p>
    </div>

    <a href="./index.html" class="back-home">← Voltar para a Home</a>
  </main>
</body>

</html>
